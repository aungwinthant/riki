openapi: "3.0.0"
info:
  title: Pet Store API
  version: "1.0.0"
  description: A sample API for testing the contract testing system

paths:
  /pets:
    post:
      operationId: createPet
      summary: Create a new pet
      tags:
        - pets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePetRequest"
      responses:
        "201":
          description: Pet created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    get:
      operationId: listPets
      summary: List all pets
      tags:
        - pets
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
          required: false
        - name: species
          in: query
          schema:
            type: string
            enum:
              - cat
              - dog
              - bird
          required: false
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"

  /pets/{petId}:
    get:
      operationId: getPetById
      summary: Get a pet by ID
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: A pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
        "404":
          description: Pet not found
    delete:
      operationId: deletePet
      summary: Delete a pet by ID
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "204":
          description: Pet deleted
        "404":
          description: Pet not found

  /users:
    post:
      operationId: createUser
      summary: Create a new user
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUserById
      summary: Get a user by ID
      tags:
        - users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: A user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      summary: Delete a user by ID
      tags:
        - users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "204":
          description: User deleted

components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
        - species
      properties:
        id:
          type: integer
          description: Unique identifier
        name:
          type: string
          maxLength: 100
        species:
          type: string
          enum:
            - cat
            - dog
            - bird
          description: Species of the pet
        age:
          type: integer
          minimum: 0
          maximum: 50
        ownerId:
          type: integer
          description: ID of the owner user

    CreatePetRequest:
      type: object
      required:
        - name
        - species
      properties:
        name:
          type: string
          maxLength: 100
          example: "Fluffy"
        species:
          type: string
          enum:
            - cat
            - dog
            - bird
          example: "cat"
        age:
          type: integer
          minimum: 0
          maximum: 999

    User:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: integer
          description: Unique identifier
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email

    CreateUserRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          maxLength: 100
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john@example.com"